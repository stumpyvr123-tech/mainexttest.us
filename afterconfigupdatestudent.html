<!DOCTYPE html>
<html>
<head>
    <title>Student Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #2d6cdf;
            color: white;
        }

        button:hover {
            background: #1f56b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Enter Access Code</h2>
    <input id="codeInput" type="text" placeholder="Enter code">
    <button onclick="checkCode()">Enter</button>
</div>

<script>
function checkCode() {
    const code = document.getElementById("codeInput").value.trim();

    if (code === "314159") {
        window.location.href = "testschmTH.html";
    } 
    else if (code === "81345") {
        window.location.href = "afterstudenttestsignin.html";
    } 
    else {
        alert("Invalid Code");
    }
}
</script>

</body>
</html>
