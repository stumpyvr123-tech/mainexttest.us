<!DOCTYPE html>
<html>
<head>
    <title>Mathematics Test</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 900px;
            margin: auto;
        }
        .question {
            margin-bottom: 20px;
        }
        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mathematics Test (20 Questions)</h1>
    <div id="test"></div>
    <button onclick="gradeTest()">Submit Test</button>
    <h2 id="result"></h2>
</div>

<script>

const questions = [
{q:"5 + 7 =", a:["10","11","12","13"], c:2},
{q:"9 x 3 =", a:["18","21","27","24"], c:2},
{q:"15 - 4 =", a:["9","10","11","12"], c:2},
{q:"36 ÷ 6 =", a:["5","6","7","8"], c:1},
{q:"12 x 4 =", a:["48","44","52","46"], c:0},
{q:"25 + 17 =", a:["40","42","43","44"], c:1},
{q:"100 - 45 =", a:["45","50","55","60"], c:2},
{q:"8² =", a:["16","64","32","48"], c:1},
{q:"√49 =", a:["6","7","8","9"], c:1},
{q:"3³ =", a:["6","9","27","12"], c:2},
{q:"14 + 29 =", a:["41","42","43","44"], c:2},
{q:"50 ÷ 5 =", a:["5","10","15","20"], c:1},
{q:"7 x 8 =", a:["54","56","58","60"], c:1},
{q:"81 ÷ 9 =", a:["8","9","7","6"], c:1},
{q:"45 + 55 =", a:["95","100","105","110"], c:1},
{q:"6 x 6 =", a:["30","32","34","36"], c:3},
{q:"120 - 30 =", a:["80","85","90","95"], c:2},
{q:"10² =", a:["20","50","100","200"], c:2},
{q:"64 ÷ 8 =", a:["6","7","8","9"], c:2},
{q:"13 + 8 =", a:["20","21","22","23"], c:1}
];

const testDiv = document.getElementById("test");

questions.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<strong>Q${index+1}: ${item.q}</strong><br>`;
    item.a.forEach((choice, i) => {
        div.innerHTML += `
            <label>
                <input type="radio" name="q${index}" value="${i}">
                ${choice}
            </label><br>
        `;
    });
    testDiv.appendChild(div);
});

function gradeTest() {
    let score = 0;
    questions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && parseInt(selected.value) === item.c) {
            score++;
        }
    });

    document.getElementById("result").innerText =
        "Final Score: " + score + " / " + questions.length;

    setTimeout(function() {
        window.location.href = "index.html";
    }, 4000);
}

</script>

</body>
</html>
